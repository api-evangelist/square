naftiko: 1.0.0-alpha2
info:
  label: Square — Bookings
  description: 'Bookings. 13 operations. Lead operation: Square List Bookings. Self-contained Naftiko capability covering one Square business surface.'
  tags:
  - Square
  - Bookings
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    SQUARE_ACCESS_TOKEN: SQUARE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: square-bookings
    baseUri: https://connect.squareup.com
    description: Square — Bookings business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.SQUARE_ACCESS_TOKEN}}'
    resources:
    - name: v2-bookings
      path: /v2/bookings
      operations:
      - name: ListBookings
        method: GET
        description: Square List Bookings
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: The maximum number of results per page to return in a paged response.
        - name: cursor
          in: query
          type: string
          required: false
          description: The pagination cursor from the preceding response to return the next page of the results. Do not set this when retrieving the first page of the results.
        - name: customer_id
          in: query
          type: string
          required: false
          description: The [customer](entity:Customer) for whom to retrieve bookings. If this is not set, bookings for all customers are retrieved.
        - name: team_member_id
          in: query
          type: string
          required: false
          description: The team member for whom to retrieve bookings. If this is not set, bookings of all members are retrieved.
        - name: location_id
          in: query
          type: string
          required: false
          description: The location for which to retrieve bookings. If this is not set, all locations' bookings are retrieved.
        - name: start_at_min
          in: query
          type: string
          required: false
          description: The RFC 3339 timestamp specifying the earliest of the start time. If this is not set, the current time is used.
        - name: start_at_max
          in: query
          type: string
          required: false
          description: The RFC 3339 timestamp specifying the latest of the start time. If this is not set, the time of 31 days after `start_at_min` is used.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: CreateBooking
        method: POST
        description: Square Create Booking
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-bookings-availability-search
      path: /v2/bookings/availability/search
      operations:
      - name: SearchAvailability
        method: POST
        description: Square Search Availability
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
