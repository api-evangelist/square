naftiko: 1.0.0-alpha2
info:
  label: Square — Snippets
  description: 'Snippets. 3 operations. Lead operation: Square Delete Snippet. Self-contained Naftiko capability covering one Square business surface.'
  tags:
  - Square
  - Snippets
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    SQUARE_ACCESS_TOKEN: SQUARE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: square-snippets
    baseUri: https://connect.squareup.com
    description: Square — Snippets business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.SQUARE_ACCESS_TOKEN}}'
    resources:
    - name: v2-sites-site-id-snippet
      path: /v2/sites/{site_id}/snippet
      operations:
      - name: DeleteSnippet
        method: DELETE
        description: Square Delete Snippet
        inputParameters:
        - name: site_id
          in: path
          type: string
          required: true
          description: The ID of the site that contains the snippet.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: RetrieveSnippet
        method: GET
        description: Square Retrieve Snippet
        inputParameters:
        - name: site_id
          in: path
          type: string
          required: true
          description: The ID of the site that contains the snippet.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: UpsertSnippet
        method: POST
        description: Square Upsert Snippet
        inputParameters:
        - name: site_id
          in: path
          type: string
          required: true
          description: The ID of the site where you want to add or update the snippet.
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: square-snippets-rest
    port: 8080
    description: REST adapter for Square — Snippets. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v2/sites/{site-id}/snippet
      name: v2-sites-site-id-snippet
      description: REST surface for /v2/sites/{site_id}/snippet.
      operations:
      - method: DELETE
        name: DeleteSnippet
        description: Square Delete Snippet
        call: square-snippets.DeleteSnippet
        with:
          site_id: rest.site_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/sites/{site-id}/snippet
      name: v2-sites-site-id-snippet
      description: REST surface for /v2/sites/{site_id}/snippet.
      operations:
      - method: GET
        name: RetrieveSnippet
        description: Square Retrieve Snippet
        call: square-snippets.RetrieveSnippet
        with:
          site_id: rest.site_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/sites/{site-id}/snippet
      name: v2-sites-site-id-snippet
      description: REST surface for /v2/sites/{site_id}/snippet.
      operations:
      - method: POST
        name: UpsertSnippet
        description: Square Upsert Snippet
        call: square-snippets.UpsertSnippet
        with:
          site_id: rest.site_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: square-snippets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Square — Snippets. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: delete-snippet
      description: Square Delete Snippet
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: square-snippets.DeleteSnippet
      with:
        site_id: tools.site_id
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-snippet
      description: Square Retrieve Snippet
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-snippets.RetrieveSnippet
      with:
        site_id: tools.site_id
      outputParameters:
      - type: object
        mapping: $.
    - name: upsert-snippet
      description: Square Upsert Snippet
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: square-snippets.UpsertSnippet
      with:
        site_id: tools.site_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
