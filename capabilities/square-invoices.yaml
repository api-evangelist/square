naftiko: 1.0.0-alpha2
info:
  label: Square — Invoices
  description: 'Invoices. 10 operations. Lead operation: Square List Invoices. Self-contained Naftiko capability covering one Square business surface.'
  tags:
  - Square
  - Invoices
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    SQUARE_ACCESS_TOKEN: SQUARE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: square-invoices
    baseUri: https://connect.squareup.com
    description: Square — Invoices business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.SQUARE_ACCESS_TOKEN}}'
    resources:
    - name: v2-invoices
      path: /v2/invoices
      operations:
      - name: ListInvoices
        method: GET
        description: Square List Invoices
        inputParameters:
        - name: location_id
          in: query
          type: string
          required: true
          description: The ID of the location for which to list invoices.
        - name: cursor
          in: query
          type: string
          required: false
          description: 'A pagination cursor returned by a previous call to this endpoint. '
        - name: limit
          in: query
          type: integer
          required: false
          description: 'The maximum number of invoices to return (200 is the maximum `limit`). '
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: CreateInvoice
        method: POST
        description: Square Create Invoice
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-invoices-search
      path: /v2/invoices/search
      operations:
      - name: SearchInvoices
        method: POST
        description: Square Search Invoices
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-invoices-invoice-id
      path: /v2/invoices/{invoice_id}
      operations:
      - name: DeleteInvoice
        method: DELETE
        description: Square Delete Invoice
        inputParameters:
        - name: invoice_id
          in: path
          type: string
          required: true
          description: The ID of the invoice to delete.
        - name: version
          in: query
          type: integer
          required: false
          description: The version of the [invoice](entity:Invoice) to delete.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: GetInvoice
        method: GET
        description: Square Get Invoice
        inputParameters:
        - name: invoice_id
          in: path
          type: string
          required: true
          description: The ID of the invoice to retrieve.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: UpdateInvoice
        method: PUT
        description: Square Update Invoice
        inputParameters:
        - name: invoice_id
          in: path
          type: string
          required: true
          description: The ID of the invoice to update.
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-invoices-invoice-id-attachments
      path: /v2/invoices/{invoice_id}/attachments
      operations:
      - name: CreateInvoiceAttachment
        method: POST
        description: Square Create Invoice Attachment
        inputParameters:
        - name: invoice_id
          in: path
          type: string
          required: true
          description: The ID of the [invoice](entity:Invoice) to attach the file to.
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-invoices-invoice-id-attachments-attachment-id
      path: /v2/invoices/{invoice_id}/attachments/{attachment_id}
      operations:
      - name: DeleteInvoiceAttachment
        method: DELETE
        description: Square Delete Invoice Attachment
        inputParameters:
        - name: invoice_id
          in: path
          type: string
          required: true
          description: The ID of the [invoice](entity:Invoice) to delete the attachment from.
        - name: attachment_id
          in: path
          type: string
          required: true
          description: The ID of the [attachment](entity:InvoiceAttachment) to delete.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-invoices-invoice-id-cancel
      path: /v2/invoices/{invoice_id}/cancel
      operations:
      - name: CancelInvoice
        method: POST
        description: Square Cancel Invoice
        inputParameters:
        - name: invoice_id
          in: path
          type: string
          required: true
          description: The ID of the [invoice](entity:Invoice) to cancel.
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-invoices-invoice-id-publish
      path: /v2/invoices/{invoice_id}/publish
