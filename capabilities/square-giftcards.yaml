naftiko: 1.0.0-alpha2
info:
  label: Square — Gift Cards
  description: 'Gift Cards. 7 operations. Lead operation: Square List Gift Cards. Self-contained Naftiko capability covering one Square business surface.'
  tags:
  - Square
  - Gift Cards
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    SQUARE_ACCESS_TOKEN: SQUARE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: square-giftcards
    baseUri: https://connect.squareup.com
    description: Square — Gift Cards business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.SQUARE_ACCESS_TOKEN}}'
    resources:
    - name: v2-gift-cards
      path: /v2/gift-cards
      operations:
      - name: ListGiftCards
        method: GET
        description: Square List Gift Cards
        inputParameters:
        - name: type
          in: query
          type: string
          required: false
          description: If a [type](entity:GiftCardType) is provided, the endpoint returns gift cards of the specified type.
        - name: state
          in: query
          type: string
          required: false
          description: If a [state](entity:GiftCardStatus) is provided, the endpoint returns the gift cards in the specified state.
        - name: limit
          in: query
          type: integer
          required: false
          description: If a limit is provided, the endpoint returns only the specified number of results per page.
        - name: cursor
          in: query
          type: string
          required: false
          description: A pagination cursor returned by a previous call to this endpoint.
        - name: customer_id
          in: query
          type: string
          required: false
          description: If a customer ID is provided, the endpoint returns only the gift cards linked to the specified customer.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: CreateGiftCard
        method: POST
        description: Square Create Gift Card
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-gift-cards-from-gan
      path: /v2/gift-cards/from-gan
      operations:
      - name: RetrieveGiftCardFromGAN
        method: POST
        description: Square Retrieve Gift Card from GAN
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-gift-cards-from-nonce
      path: /v2/gift-cards/from-nonce
      operations:
      - name: RetrieveGiftCardFromNonce
        method: POST
        description: Square Retrieve Gift Card from Nonce
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-gift-cards-gift-card-id-link-customer
      path: /v2/gift-cards/{gift_card_id}/link-customer
      operations:
      - name: LinkCustomerToGiftCard
        method: POST
        description: Square Link Customer to Gift Card
        inputParameters:
        - name: gift_card_id
          in: path
          type: string
          required: true
          description: The ID of the gift card to be linked.
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-gift-cards-gift-card-id-unlink-customer
      path: /v2/gift-cards/{gift_card_id}/unlink-customer
      operations:
      - name: UnlinkCustomerFromGiftCard
        method: POST
        description: Square Unlink Customer from Gift Card
        inputParameters:
        - name: gift_card_id
          in: path
          type: string
          required: true
          description: The ID of the gift card to be unlinked.
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-gift-cards-id
      path: /v2/gift-cards/{id}
      operations:
      - name: RetrieveGiftCard
        method: GET
        description: Square Retrieve Gift Card
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The ID of the gift card to retrieve.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
