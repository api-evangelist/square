naftiko: 1.0.0-alpha2
info:
  label: Square — Merchants
  description: 'Merchants. 2 operations. Lead operation: Square List Merchants. Self-contained Naftiko capability covering one Square business surface.'
  tags:
  - Square
  - Merchants
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    SQUARE_ACCESS_TOKEN: SQUARE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: square-merchants
    baseUri: https://connect.squareup.com
    description: Square — Merchants business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.SQUARE_ACCESS_TOKEN}}'
    resources:
    - name: v2-merchants
      path: /v2/merchants
      operations:
      - name: ListMerchants
        method: GET
        description: Square List Merchants
        inputParameters:
        - name: cursor
          in: query
          type: integer
          required: false
          description: The cursor generated by the previous response.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-merchants-merchant-id
      path: /v2/merchants/{merchant_id}
      operations:
      - name: RetrieveMerchant
        method: GET
        description: Square Retrieve Merchant
        inputParameters:
        - name: merchant_id
          in: path
          type: string
          required: true
          description: The ID of the merchant to retrieve. If the string "me" is supplied as the ID,
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: square-merchants-rest
    port: 8080
    description: REST adapter for Square — Merchants. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v2/merchants
      name: v2-merchants
      description: REST surface for /v2/merchants.
      operations:
      - method: GET
        name: ListMerchants
        description: Square List Merchants
        call: square-merchants.ListMerchants
        with:
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/merchants/{merchant-id}
      name: v2-merchants-merchant-id
      description: REST surface for /v2/merchants/{merchant_id}.
      operations:
      - method: GET
        name: RetrieveMerchant
        description: Square Retrieve Merchant
        call: square-merchants.RetrieveMerchant
        with:
          merchant_id: rest.merchant_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: square-merchants-mcp
    port: 9090
    transport: http
    description: MCP adapter for Square — Merchants. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: list-merchants
      description: Square List Merchants
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-merchants.ListMerchants
      with:
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-merchant
      description: Square Retrieve Merchant
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-merchants.RetrieveMerchant
      with:
        merchant_id: tools.merchant_id
      outputParameters:
      - type: object
        mapping: $.
