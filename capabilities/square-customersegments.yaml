naftiko: 1.0.0-alpha2
info:
  label: Square — Customer Segments
  description: 'Customer Segments. 2 operations. Lead operation: Square List Customer Segments. Self-contained Naftiko capability covering one Square business surface.'
  tags:
  - Square
  - Customer Segments
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    SQUARE_ACCESS_TOKEN: SQUARE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: square-customersegments
    baseUri: https://connect.squareup.com
    description: Square — Customer Segments business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.SQUARE_ACCESS_TOKEN}}'
    resources:
    - name: v2-customers-segments
      path: /v2/customers/segments
      operations:
      - name: ListCustomerSegments
        method: GET
        description: Square List Customer Segments
        inputParameters:
        - name: cursor
          in: query
          type: string
          required: false
          description: A pagination cursor returned by previous calls to `ListCustomerSegments`.
        - name: limit
          in: query
          type: integer
          required: false
          description: The maximum number of results to return in a single page. This limit is advisory. The response might contain more or fewer results.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-customers-segments-segment-id
      path: /v2/customers/segments/{segment_id}
      operations:
      - name: RetrieveCustomerSegment
        method: GET
        description: Square Retrieve Customer Segment
        inputParameters:
        - name: segment_id
          in: path
          type: string
          required: true
          description: The Square-issued ID of the customer segment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: square-customersegments-rest
    port: 8080
    description: REST adapter for Square — Customer Segments. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v2/customers/segments
      name: v2-customers-segments
      description: REST surface for /v2/customers/segments.
      operations:
      - method: GET
        name: ListCustomerSegments
        description: Square List Customer Segments
        call: square-customersegments.ListCustomerSegments
        with:
          cursor: rest.cursor
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/customers/segments/{segment-id}
      name: v2-customers-segments-segment-id
      description: REST surface for /v2/customers/segments/{segment_id}.
      operations:
      - method: GET
        name: RetrieveCustomerSegment
        description: Square Retrieve Customer Segment
        call: square-customersegments.RetrieveCustomerSegment
        with:
          segment_id: rest.segment_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: square-customersegments-mcp
    port: 9090
    transport: http
    description: MCP adapter for Square — Customer Segments. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: list-customer-segments
      description: Square List Customer Segments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-customersegments.ListCustomerSegments
      with:
        cursor: tools.cursor
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-customer-segment
      description: Square Retrieve Customer Segment
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-customersegments.RetrieveCustomerSegment
      with:
        segment_id: tools.segment_id
      outputParameters:
      - type: object
        mapping: $.
