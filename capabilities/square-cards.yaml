naftiko: 1.0.0-alpha2
info:
  label: Square — Cards
  description: 'Cards. 4 operations. Lead operation: Square List Cards. Self-contained Naftiko capability covering one Square business surface.'
  tags:
  - Square
  - Cards
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    SQUARE_ACCESS_TOKEN: SQUARE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: square-cards
    baseUri: https://connect.squareup.com
    description: Square — Cards business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.SQUARE_ACCESS_TOKEN}}'
    resources:
    - name: v2-cards
      path: /v2/cards
      operations:
      - name: ListCards
        method: GET
        description: Square List Cards
        inputParameters:
        - name: cursor
          in: query
          type: string
          required: false
          description: A pagination cursor returned by a previous call to this endpoint.
        - name: customer_id
          in: query
          type: string
          required: false
          description: Limit results to cards associated with the customer supplied.
        - name: include_disabled
          in: query
          type: boolean
          required: false
          description: Includes disabled cards.
        - name: reference_id
          in: query
          type: string
          required: false
          description: Limit results to cards associated with the reference_id supplied.
        - name: sort_order
          in: query
          type: string
          required: false
          description: Sorts the returned list by when the card was created with the specified order.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: CreateCard
        method: POST
        description: Square Create Card
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-cards-card-id
      path: /v2/cards/{card_id}
      operations:
      - name: RetrieveCard
        method: GET
        description: Square Retrieve Card
        inputParameters:
        - name: card_id
          in: path
          type: string
          required: true
          description: Unique ID for the desired Card.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-cards-card-id-disable
      path: /v2/cards/{card_id}/disable
      operations:
      - name: DisableCard
        method: POST
        description: Square Disable Card
        inputParameters:
        - name: card_id
          in: path
          type: string
          required: true
          description: Unique ID for the desired Card.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: square-cards-rest
    port: 8080
    description: REST adapter for Square — Cards. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v2/cards
      name: v2-cards
      description: REST surface for /v2/cards.
      operations:
      - method: GET
        name: ListCards
        description: Square List Cards
        call: square-cards.ListCards
        with:
          cursor: rest.cursor
          customer_id: rest.customer_id
          include_disabled: rest.include_disabled
          reference_id: rest.reference_id
          sort_order: rest.sort_order
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/cards
      name: v2-cards
      description: REST surface for /v2/cards.
      operations:
      - method: POST
        name: CreateCard
        description: Square Create Card
        call: square-cards.CreateCard
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/cards/{card-id}
      name: v2-cards-card-id
      description: REST surface for /v2/cards/{card_id}.
      operations:
      - method: GET
        name: RetrieveCard
        description: Square Retrieve Card
        call: square-cards.RetrieveCard
        with:
          card_id: rest.card_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/cards/{card-id}/disable
      name: v2-cards-card-id-disable
      description: REST surface for /v2/cards/{card_id}/disable.
      operations:
      - method: POST
        name: DisableCard
        description: Square Disable Card
        call: square-cards.DisableCard
        with:
          card_id: rest.card_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: square-cards-mcp
    port: 9090
    transport: http
    description: MCP adapter for Square — Cards. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: list-cards
      description: Square List Cards
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-cards.ListCards
      with:
        cursor: tools.cursor
        customer_id: tools.customer_id
        include_disabled: tools.include_disabled
        reference_id: tools.reference_id
        sort_order: tools.sort_order
      outputParameters:
      - type: object
        mapping: $.
    - name: create-card
      description: Square Create Card
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: square-cards.CreateCard
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-card
      description: Square Retrieve Card
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-cards.RetrieveCard
      with:
        card_id: tools.card_id
      outputParameters:
      - type: object
        mapping: $.
    - name: disable-card
      description: Square Disable Card
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: square-cards.DisableCard
      with:
        card_id: tools.card_id
      outputParameters:
      - type: object
        mapping: $.
