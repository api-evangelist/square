    description: Square — Locations business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.SQUARE_ACCESS_TOKEN}}'
    resources:
    - name: v2-locations
      path: /v2/locations
      operations:
      - name: ListLocations
        method: GET
        description: Square List Locations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: CreateLocation
        method: POST
        description: Square Create Location
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-locations-location-id
      path: /v2/locations/{location_id}
      operations:
      - name: RetrieveLocation
        method: GET
        description: Square Retrieve Location
        inputParameters:
        - name: location_id
          in: path
          type: string
          required: true
          description: The ID of the location to retrieve. Specify the string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: UpdateLocation
        method: PUT
        description: Square Update Location
        inputParameters:
        - name: location_id
          in: path
          type: string
          required: true
          description: The ID of the location to update.
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: square-locations-rest
    port: 8080
    description: REST adapter for Square — Locations. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v2/locations
      name: v2-locations
      description: REST surface for /v2/locations.
      operations:
      - method: GET
        name: ListLocations
        description: Square List Locations
        call: square-locations.ListLocations
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/locations
      name: v2-locations
      description: REST surface for /v2/locations.
      operations:
      - method: POST
        name: CreateLocation
        description: Square Create Location
        call: square-locations.CreateLocation
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/locations/{location-id}
      name: v2-locations-location-id
      description: REST surface for /v2/locations/{location_id}.
      operations:
      - method: GET
        name: RetrieveLocation
        description: Square Retrieve Location
        call: square-locations.RetrieveLocation
        with:
          location_id: rest.location_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/locations/{location-id}
      name: v2-locations-location-id
      description: REST surface for /v2/locations/{location_id}.
      operations:
      - method: PUT
        name: UpdateLocation
        description: Square Update Location
        call: square-locations.UpdateLocation
        with:
          location_id: rest.location_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: square-locations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Square — Locations. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: list-locations
      description: Square List Locations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-locations.ListLocations
      outputParameters:
      - type: object
        mapping: $.
    - name: create-location
      description: Square Create Location
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: square-locations.CreateLocation
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-location
      description: Square Retrieve Location
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-locations.RetrieveLocation
      with:
        location_id: tools.location_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-location
      description: Square Update Location
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: square-locations.UpdateLocation
      with:
        location_id: tools.location_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
