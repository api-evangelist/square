naftiko: 1.0.0-alpha2
info:
  label: Square — Locations
  description: 'Locations. 4 operations. Lead operation: Square List Locations. Self-contained Naftiko capability covering one Square business surface.'
  tags:
  - Square
  - Locations
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    SQUARE_ACCESS_TOKEN: SQUARE_ACCESS_TOKEN
capability:
