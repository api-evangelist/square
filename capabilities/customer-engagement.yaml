        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: redeem-loyalty-reward
        method: POST
        description: Redeems a loyalty reward.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: invoices
