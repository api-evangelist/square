      operations:
      - method: GET
        name: get-loyalty-program
        description: Get the loyalty program.
        call: square.get-loyalty-program
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/gift-cards
      name: gift-cards
      description: Manage gift cards.
      operations:
      - method: GET
        name: list-gift-cards
        description: List gift cards.
        call: square.list-gift-cards
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-gift-card
        description: Create a gift card.
        call: square.create-gift-card
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/bookings
      name: bookings
