    - name: search-loyalty-accounts
      description: Search loyalty accounts.
      hints:
        readOnly: true
        openWorld: true
      call: square.search-loyalty-accounts
      outputParameters:
      - type: object
        mapping: $.
    - name: create-loyalty-account
      description: Create a loyalty account.
      hints:
        readOnly: false
        idempotent: false
      call: square.create-loyalty-account
      outputParameters:
      - type: object
        mapping: $.
    - name: accumulate-loyalty-points
      description: Add points to a loyalty account.
      hints:
        readOnly: false
        idempotent: false
      call: square.accumulate-loyalty-points
      outputParameters:
      - type: object
