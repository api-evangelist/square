  exposes:
  - type: rest
    port: 8081
    namespace: square-engagement-api
    description: Unified REST API for Square customer engagement, loyalty, bookings, and team management.
    resources:
    - path: /v1/customers
      name: customers
      description: Manage customers.
      operations:
      - method: GET
        name: list-customers
        description: List customer profiles.
        call: square.list-customers
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-customer
        description: Create a new customer.
        call: square.create-customer
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/customers/{customer_id}
      name: customer
      description: Manage a specific customer.
      operations:
      - method: GET
        name: get-customer
        description: Get customer details.
        call: square.get-customer
        with:
          customer_id: rest.customer_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: update-customer
        description: Update a customer.
        call: square.update-customer
        with:
          customer_id: rest.customer_id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-customer
        description: Delete a customer.
        call: square.delete-customer
        with:
          customer_id: rest.customer_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/loyalty
