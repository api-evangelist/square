      - name: cancel-booking
        method: POST
        description: Cancels an existing booking.
        inputParameters:
        - name: booking_id
          in: path
          type: string
          required: true
          description: The ID of the booking.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: search-availability
        method: POST
        description: Searches for availabilities for booking.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: loyalty
      path: /v2/loyalty
      description: Manage loyalty programs and rewards.
      operations:
      - name: get-loyalty-program
        method: GET
        description: Retrieves the loyalty program in a seller's account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
