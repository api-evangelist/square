      - name: search-loyalty-accounts
        method: POST
        description: Searches for loyalty accounts.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-loyalty-account
        method: POST
        description: Creates a loyalty account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: accumulate-loyalty-points
        method: POST
        description: Adds points to a loyalty account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-loyalty-reward
