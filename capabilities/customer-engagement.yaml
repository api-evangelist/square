      - name: list-gift-cards
        method: GET
        description: Lists all gift cards.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-gift-card
        method: POST
        description: Creates a digital gift card.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-gift-card
        method: GET
        description: Retrieves a gift card.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The ID of the gift card.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
