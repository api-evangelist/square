naftiko: 1.0.0-alpha2
info:
  label: Square — Payouts
  description: 'Payouts. 3 operations. Lead operation: Square List Payouts. Self-contained Naftiko capability covering one Square business surface.'
  tags:
  - Square
  - Payouts
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    SQUARE_ACCESS_TOKEN: SQUARE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: square-payouts
    baseUri: https://connect.squareup.com
    description: Square — Payouts business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.SQUARE_ACCESS_TOKEN}}'
    resources:
    - name: v2-payouts
      path: /v2/payouts
      operations:
      - name: ListPayouts
        method: GET
        description: Square List Payouts
        inputParameters:
        - name: location_id
          in: query
          type: string
          required: false
          description: The ID of the location for which to list the payouts.
        - name: status
          in: query
          type: string
          required: false
          description: If provided, only payouts with the given status are returned.
        - name: begin_time
          in: query
          type: string
          required: false
          description: The timestamp for the beginning of the payout creation time, in RFC 3339 format.
        - name: end_time
          in: query
          type: string
          required: false
          description: The timestamp for the end of the payout creation time, in RFC 3339 format.
        - name: sort_order
          in: query
          type: string
          required: false
          description: The order in which payouts are listed.
        - name: cursor
          in: query
          type: string
          required: false
          description: A pagination cursor returned by a previous call to this endpoint.
        - name: limit
          in: query
          type: integer
          required: false
          description: The maximum number of results to be returned in a single page.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-payouts-payout-id
      path: /v2/payouts/{payout_id}
      operations:
      - name: GetPayout
        method: GET
        description: Square Get Payout
        inputParameters:
        - name: payout_id
          in: path
          type: string
          required: true
          description: The ID of the payout to retrieve the information for.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-payouts-payout-id-payout-entries
      path: /v2/payouts/{payout_id}/payout-entries
      operations:
      - name: ListPayoutEntries
        method: GET
        description: Square List Payout Entries
        inputParameters:
        - name: payout_id
          in: path
          type: string
          required: true
          description: The ID of the payout to retrieve the information for.
        - name: sort_order
          in: query
          type: string
          required: false
          description: The order in which payout entries are listed.
        - name: cursor
          in: query
          type: string
          required: false
          description: A pagination cursor returned by a previous call to this endpoint.
        - name: limit
          in: query
          type: integer
          required: false
          description: The maximum number of results to be returned in a single page.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: square-payouts-rest
    port: 8080
    description: REST adapter for Square — Payouts. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v2/payouts
      name: v2-payouts
      description: REST surface for /v2/payouts.
      operations:
      - method: GET
        name: ListPayouts
        description: Square List Payouts
        call: square-payouts.ListPayouts
        with:
          location_id: rest.location_id
          status: rest.status
          begin_time: rest.begin_time
          end_time: rest.end_time
          sort_order: rest.sort_order
          cursor: rest.cursor
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/payouts/{payout-id}
      name: v2-payouts-payout-id
      description: REST surface for /v2/payouts/{payout_id}.
      operations:
      - method: GET
        name: GetPayout
        description: Square Get Payout
        call: square-payouts.GetPayout
        with:
          payout_id: rest.payout_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/payouts/{payout-id}/payout-entries
      name: v2-payouts-payout-id-payout-entries
      description: REST surface for /v2/payouts/{payout_id}/payout-entries.
      operations:
      - method: GET
        name: ListPayoutEntries
        description: Square List Payout Entries
        call: square-payouts.ListPayoutEntries
        with:
          payout_id: rest.payout_id
          sort_order: rest.sort_order
          cursor: rest.cursor
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: square-payouts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Square — Payouts. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: list-payouts
      description: Square List Payouts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-payouts.ListPayouts
      with:
        location_id: tools.location_id
        status: tools.status
        begin_time: tools.begin_time
        end_time: tools.end_time
        sort_order: tools.sort_order
        cursor: tools.cursor
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: get-payout
      description: Square Get Payout
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-payouts.GetPayout
      with:
        payout_id: tools.payout_id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-payout-entries
      description: Square List Payout Entries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-payouts.ListPayoutEntries
      with:
        payout_id: tools.payout_id
        sort_order: tools.sort_order
        cursor: tools.cursor
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
