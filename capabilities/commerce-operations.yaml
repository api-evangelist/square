        description: Retrieves a gift card.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The ID of the gift card.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: team-members
      path: /v2/team-members
      description: Manage team members.
      operations:
      - name: search-team-members
        method: POST
        description: Returns a paginated list of team members.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-team-member
        method: POST
        description: Creates a single team member.
        outputRawFormat: json
        outputParameters:
