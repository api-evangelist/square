          type: object
          value: $.
      - name: create-invoice
        method: POST
        description: Creates a draft invoice.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-invoice
        method: GET
        description: Retrieves an invoice by invoice ID.
        inputParameters:
        - name: invoice_id
          in: path
          type: string
          required: true
          description: The ID of the invoice.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: subscriptions
      path: /v2/subscriptions
      description: Manage subscription plans.
      operations:
      - name: create-subscription
        method: POST
        description: Creates a subscription.
        outputRawFormat: json
        outputParameters:
        - name: result
