naftiko: 1.0.0-alpha2
info:
  label: Square Commerce Operations
  description: Unified workflow for commerce operations combining payments, orders, catalog, inventory, checkout, invoicing,
    subscriptions, and refunds. Used by commerce developers and business operators to manage the full sales lifecycle.
  tags:
  - Square
  - Commerce
  - Payments
  - Orders
  - Catalog
  - Inventory
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    SQUARE_ACCESS_TOKEN: SQUARE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: square
    baseUri: https://connect.squareup.com
    description: Square API for payments, commerce, and business management.
    authentication:
      type: bearer
      token: '{{SQUARE_ACCESS_TOKEN}}'
    resources:
    - name: payments
      path: /v2/payments
      description: Take and manage payments.
      operations:
      - name: list-payments
        method: GET
        description: Retrieves a list of payments taken by the account.
        inputParameters:
        - name: begin_time
          in: query
          type: string
          required: false
          description: Timestamp for the beginning of the reporting period.
        - name: end_time
          in: query
          type: string
          required: false
          description: Timestamp for the end of the reporting period.
        - name: cursor
          in: query
          type: string
          required: false
          description: Pagination cursor.
        - name: location_id
          in: query
          type: string
          required: false
          description: Limit results to the location.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-payment
        method: POST
        description: Creates a payment using the provided source.
        inputParameters:
        - name: source_id
          in: body
          type: string
          required: true
          description: The ID for the source of funds.
        - name: idempotency_key
          in: body
          type: string
          required: true
          description: A unique string to identify this payment.
        - name: amount_money
          in: body
          type: object
          required: true
          description: The amount of money to accept.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            source_id: '{{tools.source_id}}'
            idempotency_key: '{{tools.idempotency_key}}'
            amount_money: '{{tools.amount_money}}'
      - name: get-payment
        method: GET
        description: Retrieves details for a specific payment.
        inputParameters:
        - name: payment_id
          in: path
          type: string
          required: true
          description: A unique ID for the desired payment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: cancel-payment
        method: POST
        description: Cancels a payment.
        inputParameters:
        - name: payment_id
          in: path
          type: string
          required: true
          description: The ID of the payment to cancel.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: complete-payment
        method: POST
        description: Completes a payment.
        inputParameters:
        - name: payment_id
          in: path
          type: string
          required: true
          description: The unique ID of the payment to complete.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: refunds
      path: /v2/refunds
      description: Process refunds for payments.
      operations:
      - name: list-payment-refunds
        method: GET
        description: Retrieves a list of refunds.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: refund-payment
        method: POST
        description: Refunds a payment.
        inputParameters:
        - name: idempotency_key
          in: body
          type: string
          required: true
          description: A unique string to identify the refund.
        - name: payment_id
          in: body
          type: string
          required: true
          description: The ID of the payment to refund.
        - name: amount_money
          in: body
          type: object
          required: true
          description: The amount of money to refund.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            idempotency_key: '{{tools.idempotency_key}}'
            payment_id: '{{tools.payment_id}}'
            amount_money: '{{tools.amount_money}}'
    - name: orders
      path: /v2/orders
      description: Create and manage orders.
      operations:
      - name: create-order
        method: POST
        description: Creates a new order.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: search-orders
        method: POST
        description: Search all orders for one or more locations.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-order
        method: GET
        description: Retrieves an order by ID.
        inputParameters:
        - name: order_id
          in: path
          type: string
          required: true
          description: The ID of the order to retrieve.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-order
        method: PUT
        description: Updates an open order.
        inputParameters:
        - name: order_id
          in: path
          type: string
          required: true
          description: The ID of the order to update.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: catalog
      path: /v2/catalog
      description: Manage product catalogs.
      operations:
      - name: list-catalog
        method: GET
        description: Returns a list of catalog objects.
        inputParameters:
        - name: types
          in: query
          type: string
          required: false
          description: An optional case-insensitive, comma-separated list of object types.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: upsert-catalog-object
        method: POST
        description: Creates or updates a catalog object.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-catalog-object
        method: GET
        description: Returns a single catalog object.
        inputParameters:
        - name: object_id
          in: path
          type: string
          required: true
          description: The object ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-catalog-object
        method: DELETE
        description: Deletes a catalog object.
        inputParameters:
        - name: object_id
          in: path
          type: string
          required: true
          description: The object ID to delete.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: search-catalog-objects
        method: POST
        description: Searches for catalog objects.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: inventory
      path: /v2/inventory
      description: Track and manage inventory.
      operations:
      - name: batch-retrieve-inventory-counts
        method: POST
        description: Retrieves the current calculated stock count for a set of catalog objects.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: batch-change-inventory
        method: POST
        description: Applies adjustments and counts to the provided item quantities.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: customers
      path: /v2/customers
      description: Create and manage customers.
      operations:
      - name: list-customers
        method: GET
        description: Lists customer profiles.
        outputRawFormat: json
        outputParameters:
        - name: result
