      operations:
      - name: list-invoices
        method: GET
        description: Returns a list of invoices for a given location.
        inputParameters:
        - name: location_id
          in: query
          type: string
          required: true
          description: The ID of the location.
        outputRawFormat: json
        outputParameters:
