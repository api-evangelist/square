          value: $.
      - name: search-subscriptions
        method: POST
        description: Searches for subscriptions.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-subscription
        method: GET
        description: Retrieves a subscription.
        inputParameters:
        - name: subscription_id
          in: path
          type: string
          required: true
          description: The ID of the subscription.
        outputRawFormat: json
        outputParameters:
        - name: result
