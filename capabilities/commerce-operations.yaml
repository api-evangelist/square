      operations:
      - name: list-disputes
        method: GET
        description: Returns a list of disputes.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-dispute
        method: GET
        description: Returns details about a specific dispute.
        inputParameters:
        - name: dispute_id
          in: path
          type: string
          required: true
          description: The ID of the dispute.
        outputRawFormat: json
        outputParameters:
        - name: result
