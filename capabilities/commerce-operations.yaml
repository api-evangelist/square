        inputParameters:
        - name: customer_id
          in: path
          type: string
          required: true
          description: The ID of the customer.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: locations
      path: /v2/locations
      description: Manage business locations.
      operations:
      - name: list-locations
        method: GET
        description: Lists all of a business's locations.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-location
        method: POST
        description: Creates a location.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-location
        method: GET
        description: Retrieves details of a specific location.
        inputParameters:
        - name: location_id
          in: path
          type: string
          required: true
          description: The ID of the location.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: bookings
      path: /v2/bookings
      description: Create and manage bookings.
      operations:
      - name: list-bookings
        method: GET
        description: Retrieve a collection of bookings.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-booking
        method: POST
        description: Creates a booking.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-booking
        method: GET
        description: Retrieves a booking.
        inputParameters:
        - name: booking_id
          in: path
          type: string
          required: true
          description: The ID of the booking.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-booking
        method: PUT
        description: Updates a booking.
        inputParameters:
        - name: booking_id
          in: path
          type: string
          required: true
          description: The ID of the booking.
