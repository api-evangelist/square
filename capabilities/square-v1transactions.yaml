naftiko: 1.0.0-alpha2
info:
  label: Square — V1Transactions
  description: 'V1Transactions. 3 operations. Lead operation: Square V1 List Orders. Self-contained Naftiko capability covering one Square business surface.'
  tags:
  - Square
  - V1Transactions
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    SQUARE_ACCESS_TOKEN: SQUARE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: square-v1transactions
    baseUri: https://connect.squareup.com
    description: Square — V1Transactions business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.SQUARE_ACCESS_TOKEN}}'
    resources:
    - name: v1-location-id-orders
      path: /v1/{location_id}/orders
      operations:
      - name: V1ListOrders
        method: GET
        description: Square V1 List Orders
        inputParameters:
        - name: location_id
          in: path
          type: string
          required: true
          description: The ID of the location to list online store orders for.
        - name: order
          in: query
          type: string
          required: false
          description: The order in which payments are listed in the response.
        - name: limit
          in: query
          type: integer
          required: false
          description: The maximum number of payments to return in a single response. This value cannot exceed 200.
        - name: batch_token
          in: query
          type: string
          required: false
          description: A pagination cursor to retrieve the next set of results for your
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-location-id-orders-order-id
      path: /v1/{location_id}/orders/{order_id}
      operations:
      - name: V1RetrieveOrder
        method: GET
        description: Square V1 Retrieve Order
        inputParameters:
        - name: location_id
          in: path
          type: string
          required: true
          description: The ID of the order's associated location.
        - name: order_id
          in: path
          type: string
          required: true
          description: The order's Square-issued ID. You obtain this value from Order objects returned by the List Orders endpoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: V1UpdateOrder
        method: PUT
        description: Square V1 Update Order
        inputParameters:
        - name: location_id
          in: path
          type: string
          required: true
          description: The ID of the order's associated location.
        - name: order_id
          in: path
          type: string
          required: true
          description: The order's Square-issued ID. You obtain this value from Order objects returned by the List Orders endpoint
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: square-v1transactions-rest
    port: 8080
    description: REST adapter for Square — V1Transactions. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/{location-id}/orders
      name: v1-location-id-orders
      description: REST surface for /v1/{location_id}/orders.
      operations:
      - method: GET
        name: V1ListOrders
        description: Square V1 List Orders
        call: square-v1transactions.V1ListOrders
        with:
          location_id: rest.location_id
          order: rest.order
          limit: rest.limit
          batch_token: rest.batch_token
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/{location-id}/orders/{order-id}
      name: v1-location-id-orders-order-id
      description: REST surface for /v1/{location_id}/orders/{order_id}.
      operations:
      - method: GET
        name: V1RetrieveOrder
        description: Square V1 Retrieve Order
        call: square-v1transactions.V1RetrieveOrder
        with:
          location_id: rest.location_id
          order_id: rest.order_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/{location-id}/orders/{order-id}
      name: v1-location-id-orders-order-id
      description: REST surface for /v1/{location_id}/orders/{order_id}.
      operations:
      - method: PUT
        name: V1UpdateOrder
        description: Square V1 Update Order
        call: square-v1transactions.V1UpdateOrder
        with:
          location_id: rest.location_id
          order_id: rest.order_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: square-v1transactions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Square — V1Transactions. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: v1-list-orders
      description: Square V1 List Orders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-v1transactions.V1ListOrders
      with:
        location_id: tools.location_id
        order: tools.order
        limit: tools.limit
        batch_token: tools.batch_token
      outputParameters:
      - type: object
        mapping: $.
    - name: v1-retrieve-order
      description: Square V1 Retrieve Order
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-v1transactions.V1RetrieveOrder
      with:
        location_id: tools.location_id
        order_id: tools.order_id
      outputParameters:
      - type: object
        mapping: $.
    - name: v1-update-order
      description: Square V1 Update Order
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: square-v1transactions.V1UpdateOrder
      with:
        location_id: tools.location_id
        order_id: tools.order_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
