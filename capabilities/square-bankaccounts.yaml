naftiko: 1.0.0-alpha2
info:
  label: Square — Bank Accounts
  description: 'Bank Accounts. 3 operations. Lead operation: Square List Bank Accounts. Self-contained Naftiko capability covering one Square business surface.'
  tags:
  - Square
  - Bank Accounts
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    SQUARE_ACCESS_TOKEN: SQUARE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: square-bankaccounts
    baseUri: https://connect.squareup.com
    description: Square — Bank Accounts business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.SQUARE_ACCESS_TOKEN}}'
    resources:
    - name: v2-bank-accounts
      path: /v2/bank-accounts
      operations:
      - name: ListBankAccounts
        method: GET
        description: Square List Bank Accounts
        inputParameters:
        - name: cursor
          in: query
          type: string
          required: false
          description: The pagination cursor returned by a previous call to this endpoint.
        - name: limit
          in: query
          type: integer
          required: false
          description: 'Upper limit on the number of bank accounts to return in the response. '
        - name: location_id
          in: query
          type: string
          required: false
          description: 'Location ID. You can specify this optional filter '
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-bank-accounts-by-v1-id-v1-bank-account-id
      path: /v2/bank-accounts/by-v1-id/{v1_bank_account_id}
      operations:
      - name: GetBankAccountByV1Id
        method: GET
        description: Square Get Bank Account by V1 ID
        inputParameters:
        - name: v1_bank_account_id
          in: path
          type: string
          required: true
          description: 'Connect V1 ID of the desired `BankAccount`. For more information, see '
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-bank-accounts-bank-account-id
      path: /v2/bank-accounts/{bank_account_id}
      operations:
      - name: GetBankAccount
        method: GET
        description: Square Get Bank Account
        inputParameters:
        - name: bank_account_id
          in: path
          type: string
          required: true
          description: Square-issued ID of the desired `BankAccount`.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: square-bankaccounts-rest
    port: 8080
    description: REST adapter for Square — Bank Accounts. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v2/bank-accounts
      name: v2-bank-accounts
      description: REST surface for /v2/bank-accounts.
      operations:
      - method: GET
        name: ListBankAccounts
        description: Square List Bank Accounts
        call: square-bankaccounts.ListBankAccounts
        with:
          cursor: rest.cursor
          limit: rest.limit
          location_id: rest.location_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/bank-accounts/by-v1-id/{v1-bank-account-id}
      name: v2-bank-accounts-by-v1-id-v1-bank-account-id
      description: REST surface for /v2/bank-accounts/by-v1-id/{v1_bank_account_id}.
      operations:
      - method: GET
        name: GetBankAccountByV1Id
        description: Square Get Bank Account by V1 ID
        call: square-bankaccounts.GetBankAccountByV1Id
        with:
          v1_bank_account_id: rest.v1_bank_account_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/bank-accounts/{bank-account-id}
      name: v2-bank-accounts-bank-account-id
      description: REST surface for /v2/bank-accounts/{bank_account_id}.
      operations:
      - method: GET
        name: GetBankAccount
        description: Square Get Bank Account
        call: square-bankaccounts.GetBankAccount
        with:
          bank_account_id: rest.bank_account_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: square-bankaccounts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Square — Bank Accounts. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: list-bank-accounts
      description: Square List Bank Accounts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-bankaccounts.ListBankAccounts
      with:
        cursor: tools.cursor
        limit: tools.limit
        location_id: tools.location_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-bank-account-v1-id
      description: Square Get Bank Account by V1 ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-bankaccounts.GetBankAccountByV1Id
      with:
        v1_bank_account_id: tools.v1_bank_account_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-bank-account
      description: Square Get Bank Account
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-bankaccounts.GetBankAccount
      with:
        bank_account_id: tools.bank_account_id
      outputParameters:
      - type: object
        mapping: $.
