naftiko: 1.0.0-alpha2
info:
  label: Square — Cash Drawers
  description: 'Cash Drawers. 3 operations. Lead operation: Square List Cash Drawer Shifts. Self-contained Naftiko capability covering one Square business surface.'
  tags:
  - Square
  - Cash Drawers
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    SQUARE_ACCESS_TOKEN: SQUARE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: square-cashdrawers
    baseUri: https://connect.squareup.com
    description: Square — Cash Drawers business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.SQUARE_ACCESS_TOKEN}}'
    resources:
    - name: v2-cash-drawers-shifts
      path: /v2/cash-drawers/shifts
      operations:
      - name: ListCashDrawerShifts
        method: GET
        description: Square List Cash Drawer Shifts
        inputParameters:
        - name: location_id
          in: query
          type: string
          required: true
          description: The ID of the location to query for a list of cash drawer shifts.
        - name: sort_order
          in: query
          type: string
          required: false
          description: The order in which cash drawer shifts are listed in the response,
        - name: begin_time
          in: query
          type: string
          required: false
          description: The inclusive start time of the query on opened_at, in ISO 8601 format.
        - name: end_time
          in: query
          type: string
          required: false
          description: The exclusive end date of the query on opened_at, in ISO 8601 format.
        - name: limit
          in: query
          type: integer
          required: false
          description: Number of cash drawer shift events in a page of results (200 by
        - name: cursor
          in: query
          type: string
          required: false
          description: Opaque cursor for fetching the next page of results.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-cash-drawers-shifts-shift-id
      path: /v2/cash-drawers/shifts/{shift_id}
      operations:
      - name: RetrieveCashDrawerShift
        method: GET
        description: Square Retrieve Cash Drawer Shift
        inputParameters:
        - name: location_id
          in: query
          type: string
          required: true
          description: The ID of the location to retrieve cash drawer shifts from.
        - name: shift_id
          in: path
          type: string
          required: true
          description: The shift ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-cash-drawers-shifts-shift-id-events
      path: /v2/cash-drawers/shifts/{shift_id}/events
      operations:
      - name: ListCashDrawerShiftEvents
        method: GET
        description: Square List Cash Drawer Shift Events
        inputParameters:
        - name: location_id
          in: query
          type: string
          required: true
          description: The ID of the location to list cash drawer shifts for.
        - name: shift_id
          in: path
          type: string
          required: true
          description: The shift ID.
        - name: limit
          in: query
          type: integer
          required: false
          description: Number of resources to be returned in a page of results (200 by
        - name: cursor
          in: query
          type: string
          required: false
          description: Opaque cursor for fetching the next page of results.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: square-cashdrawers-rest
    port: 8080
    description: REST adapter for Square — Cash Drawers. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v2/cash-drawers/shifts
      name: v2-cash-drawers-shifts
      description: REST surface for /v2/cash-drawers/shifts.
      operations:
      - method: GET
        name: ListCashDrawerShifts
        description: Square List Cash Drawer Shifts
        call: square-cashdrawers.ListCashDrawerShifts
        with:
          location_id: rest.location_id
          sort_order: rest.sort_order
          begin_time: rest.begin_time
          end_time: rest.end_time
          limit: rest.limit
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/cash-drawers/shifts/{shift-id}
      name: v2-cash-drawers-shifts-shift-id
      description: REST surface for /v2/cash-drawers/shifts/{shift_id}.
      operations:
      - method: GET
        name: RetrieveCashDrawerShift
        description: Square Retrieve Cash Drawer Shift
        call: square-cashdrawers.RetrieveCashDrawerShift
        with:
          location_id: rest.location_id
          shift_id: rest.shift_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/cash-drawers/shifts/{shift-id}/events
      name: v2-cash-drawers-shifts-shift-id-events
      description: REST surface for /v2/cash-drawers/shifts/{shift_id}/events.
      operations:
      - method: GET
        name: ListCashDrawerShiftEvents
        description: Square List Cash Drawer Shift Events
        call: square-cashdrawers.ListCashDrawerShiftEvents
        with:
          location_id: rest.location_id
          shift_id: rest.shift_id
          limit: rest.limit
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: square-cashdrawers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Square — Cash Drawers. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: list-cash-drawer-shifts
      description: Square List Cash Drawer Shifts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-cashdrawers.ListCashDrawerShifts
      with:
        location_id: tools.location_id
        sort_order: tools.sort_order
        begin_time: tools.begin_time
        end_time: tools.end_time
        limit: tools.limit
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-cash-drawer-shift
      description: Square Retrieve Cash Drawer Shift
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-cashdrawers.RetrieveCashDrawerShift
      with:
        location_id: tools.location_id
        shift_id: tools.shift_id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-cash-drawer-shift-events
      description: Square List Cash Drawer Shift Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-cashdrawers.ListCashDrawerShiftEvents
      with:
        location_id: tools.location_id
        shift_id: tools.shift_id
        limit: tools.limit
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
