naftiko: 1.0.0-alpha2
info:
  label: Square — Transactions
  description: 'Transactions. 4 operations. Lead operation: Square List Transactions. Self-contained Naftiko capability covering one Square business surface.'
  tags:
  - Square
  - Transactions
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    SQUARE_ACCESS_TOKEN: SQUARE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: square-transactions
    baseUri: https://connect.squareup.com
    description: Square — Transactions business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.SQUARE_ACCESS_TOKEN}}'
    resources:
    - name: v2-locations-location-id-transactions
      path: /v2/locations/{location_id}/transactions
      operations:
      - name: ListTransactions
        method: GET
        description: Square List Transactions
        inputParameters:
        - name: location_id
          in: path
          type: string
          required: true
          description: The ID of the location to list transactions for.
        - name: begin_time
          in: query
          type: string
          required: false
          description: The beginning of the requested reporting period, in RFC 3339 format.
        - name: end_time
          in: query
          type: string
          required: false
          description: The end of the requested reporting period, in RFC 3339 format.
        - name: sort_order
          in: query
          type: string
          required: false
          description: The order in which results are listed in the response (`ASC` for
        - name: cursor
          in: query
          type: string
          required: false
          description: A pagination cursor returned by a previous call to this endpoint.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-locations-location-id-transactions-transaction-id
      path: /v2/locations/{location_id}/transactions/{transaction_id}
      operations:
      - name: RetrieveTransaction
        method: GET
        description: Square Retrieve Transaction
        inputParameters:
        - name: location_id
          in: path
          type: string
          required: true
          description: The ID of the transaction's associated location.
        - name: transaction_id
          in: path
          type: string
          required: true
          description: The ID of the transaction to retrieve.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-locations-location-id-transactions-transaction-id-capture
      path: /v2/locations/{location_id}/transactions/{transaction_id}/capture
      operations:
      - name: CaptureTransaction
        method: POST
        description: Square Capture Transaction
        inputParameters:
        - name: location_id
          in: path
          type: string
          required: true
          description: location_id
        - name: transaction_id
          in: path
          type: string
          required: true
          description: transaction_id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-locations-location-id-transactions-transaction-id-void
      path: /v2/locations/{location_id}/transactions/{transaction_id}/void
      operations:
      - name: VoidTransaction
        method: POST
        description: Square Void Transaction
        inputParameters:
        - name: location_id
          in: path
          type: string
          required: true
          description: location_id
        - name: transaction_id
          in: path
          type: string
          required: true
          description: transaction_id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: square-transactions-rest
    port: 8080
    description: REST adapter for Square — Transactions. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v2/locations/{location-id}/transactions
      name: v2-locations-location-id-transactions
      description: REST surface for /v2/locations/{location_id}/transactions.
      operations:
      - method: GET
        name: ListTransactions
        description: Square List Transactions
        call: square-transactions.ListTransactions
        with:
          location_id: rest.location_id
          begin_time: rest.begin_time
          end_time: rest.end_time
          sort_order: rest.sort_order
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/locations/{location-id}/transactions/{transaction-id}
      name: v2-locations-location-id-transactions-transaction-id
      description: REST surface for /v2/locations/{location_id}/transactions/{transaction_id}.
      operations:
      - method: GET
        name: RetrieveTransaction
        description: Square Retrieve Transaction
        call: square-transactions.RetrieveTransaction
        with:
          location_id: rest.location_id
          transaction_id: rest.transaction_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/locations/{location-id}/transactions/{transaction-id}/capture
      name: v2-locations-location-id-transactions-transaction-id-capture
      description: REST surface for /v2/locations/{location_id}/transactions/{transaction_id}/capture.
      operations:
      - method: POST
        name: CaptureTransaction
        description: Square Capture Transaction
        call: square-transactions.CaptureTransaction
        with:
          location_id: rest.location_id
          transaction_id: rest.transaction_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/locations/{location-id}/transactions/{transaction-id}/void
      name: v2-locations-location-id-transactions-transaction-id-void
      description: REST surface for /v2/locations/{location_id}/transactions/{transaction_id}/void.
      operations:
      - method: POST
        name: VoidTransaction
        description: Square Void Transaction
        call: square-transactions.VoidTransaction
        with:
          location_id: rest.location_id
          transaction_id: rest.transaction_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: square-transactions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Square — Transactions. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: list-transactions
      description: Square List Transactions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-transactions.ListTransactions
      with:
        location_id: tools.location_id
        begin_time: tools.begin_time
        end_time: tools.end_time
        sort_order: tools.sort_order
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-transaction
      description: Square Retrieve Transaction
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-transactions.RetrieveTransaction
      with:
        location_id: tools.location_id
        transaction_id: tools.transaction_id
      outputParameters:
      - type: object
        mapping: $.
    - name: capture-transaction
      description: Square Capture Transaction
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: square-transactions.CaptureTransaction
      with:
        location_id: tools.location_id
        transaction_id: tools.transaction_id
      outputParameters:
      - type: object
        mapping: $.
    - name: void-transaction
      description: Square Void Transaction
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: square-transactions.VoidTransaction
      with:
        location_id: tools.location_id
        transaction_id: tools.transaction_id
      outputParameters:
      - type: object
        mapping: $.
