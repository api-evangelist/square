naftiko: 1.0.0-alpha2
info:
  label: Square — Refunds
  description: 'Refunds. 3 operations. Lead operation: Square List Payment Refunds. Self-contained Naftiko capability covering one Square business surface.'
  tags:
  - Square
  - Refunds
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    SQUARE_ACCESS_TOKEN: SQUARE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: square-refunds
    baseUri: https://connect.squareup.com
    description: Square — Refunds business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.SQUARE_ACCESS_TOKEN}}'
    resources:
    - name: v2-refunds
      path: /v2/refunds
      operations:
      - name: ListPaymentRefunds
        method: GET
        description: Square List Payment Refunds
        inputParameters:
        - name: begin_time
          in: query
          type: string
          required: false
          description: 'Indicates the start of the time range to retrieve each `PaymentRefund` for, in RFC 3339 '
        - name: end_time
          in: query
          type: string
          required: false
          description: 'Indicates the end of the time range to retrieve each `PaymentRefund` for, in RFC 3339 '
        - name: sort_order
          in: query
          type: string
          required: false
          description: 'The order in which results are listed by `PaymentRefund.created_at`:'
        - name: cursor
          in: query
          type: string
          required: false
          description: A pagination cursor returned by a previous call to this endpoint.
        - name: location_id
          in: query
          type: string
          required: false
          description: Limit results to the location supplied. By default, results are returned
        - name: status
          in: query
          type: string
          required: false
          description: If provided, only refunds with the given status are returned.
        - name: source_type
          in: query
          type: string
          required: false
          description: If provided, only returns refunds whose payments have the indicated source type.
        - name: limit
          in: query
          type: integer
          required: false
          description: The maximum number of results to be returned in a single page.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: RefundPayment
        method: POST
        description: Square Refund Payment
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-refunds-refund-id
      path: /v2/refunds/{refund_id}
      operations:
      - name: GetPaymentRefund
        method: GET
        description: Square Get Payment Refund
        inputParameters:
        - name: refund_id
          in: path
          type: string
          required: true
          description: The unique ID for the desired `PaymentRefund`.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: square-refunds-rest
    port: 8080
    description: REST adapter for Square — Refunds. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v2/refunds
      name: v2-refunds
      description: REST surface for /v2/refunds.
      operations:
      - method: GET
        name: ListPaymentRefunds
        description: Square List Payment Refunds
        call: square-refunds.ListPaymentRefunds
        with:
          begin_time: rest.begin_time
          end_time: rest.end_time
          sort_order: rest.sort_order
          cursor: rest.cursor
          location_id: rest.location_id
          status: rest.status
          source_type: rest.source_type
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/refunds
      name: v2-refunds
      description: REST surface for /v2/refunds.
      operations:
      - method: POST
        name: RefundPayment
        description: Square Refund Payment
        call: square-refunds.RefundPayment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/refunds/{refund-id}
      name: v2-refunds-refund-id
      description: REST surface for /v2/refunds/{refund_id}.
      operations:
      - method: GET
        name: GetPaymentRefund
        description: Square Get Payment Refund
        call: square-refunds.GetPaymentRefund
        with:
          refund_id: rest.refund_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: square-refunds-mcp
    port: 9090
    transport: http
    description: MCP adapter for Square — Refunds. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: list-payment-refunds
      description: Square List Payment Refunds
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-refunds.ListPaymentRefunds
      with:
        begin_time: tools.begin_time
        end_time: tools.end_time
        sort_order: tools.sort_order
        cursor: tools.cursor
        location_id: tools.location_id
        status: tools.status
        source_type: tools.source_type
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: refund-payment
      description: Square Refund Payment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: square-refunds.RefundPayment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-payment-refund
      description: Square Get Payment Refund
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: square-refunds.GetPaymentRefund
      with:
        refund_id: tools.refund_id
      outputParameters:
      - type: object
        mapping: $.
