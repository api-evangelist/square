naftiko: 1.0.0-alpha2
info:
  label: Square — Mobile Authorization
  description: 'Mobile Authorization. 1 operations. Lead operation: Square Create Mobile Authorization Code. Self-contained Naftiko capability covering one Square business surface.'
  tags:
  - Square
  - Mobile Authorization
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    SQUARE_ACCESS_TOKEN: SQUARE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: square-mobileauthorization
    baseUri: https://connect.squareup.com
    description: Square — Mobile Authorization business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.SQUARE_ACCESS_TOKEN}}'
    resources:
    - name: mobile-authorization-code
      path: /mobile/authorization-code
      operations:
      - name: CreateMobileAuthorizationCode
        method: POST
        description: Square Create Mobile Authorization Code
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: square-mobileauthorization-rest
    port: 8080
    description: REST adapter for Square — Mobile Authorization. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/mobile/authorization-code
      name: mobile-authorization-code
      description: REST surface for /mobile/authorization-code.
      operations:
      - method: POST
        name: CreateMobileAuthorizationCode
        description: Square Create Mobile Authorization Code
        call: square-mobileauthorization.CreateMobileAuthorizationCode
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: square-mobileauthorization-mcp
    port: 9090
    transport: http
    description: MCP adapter for Square — Mobile Authorization. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: create-mobile-authorization-code
      description: Square Create Mobile Authorization Code
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: square-mobileauthorization.CreateMobileAuthorizationCode
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
