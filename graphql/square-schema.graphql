type OrderSource {
  name: String
}

type OrderTax {
  uid: String
  catalogObjectId: ID
  catalogVersion: Int
  name: String
  type: String
  percentage: String
  metadata: JSON
  appliedMoney: Money
  scope: String
  autoApplied: Boolean
}

type OrderDiscount {
  uid: String
  catalogObjectId: ID
  catalogVersion: Int
  name: String
  type: String
  percentage: String
  amountMoney: Money
  appliedMoney: Money
  metadata: JSON
  scope: String
  rewardIds: [String]
  pricingRuleId: ID
}

type OrderServiceCharge {
  uid: String
  name: String
  catalogObjectId: ID
  catalogVersion: Int
  percentage: String
