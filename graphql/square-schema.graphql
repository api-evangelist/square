  returnAmounts: OrderAmounts
  netAmounts: OrderAmounts
  roundingAdjustment: OrderRoundingAdjustment
  tenders: [OrderTender]
  refunds: [Refund]
  metadata: JSON
  createdAt: DateTime!
  updatedAt: DateTime
  closedAt: DateTime
  state: OrderState!
  version: Int
  totalMoney: Money
  totalTaxMoney: Money
  totalDiscountMoney: Money
  totalTipMoney: Money
  totalServiceChargeMoney: Money
  ticketName: String
