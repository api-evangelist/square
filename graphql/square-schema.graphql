# Square GraphQL Schema
# Conceptual schema derived from the Square REST API
# https://developer.squareup.com/reference/square/

# ─────────────────────────────────────────────
# Scalars
# ─────────────────────────────────────────────

scalar DateTime
scalar JSON

# ─────────────────────────────────────────────
# Enums
# ─────────────────────────────────────────────

enum Currency {
  USD
  CAD
  GBP
  AUD
  EUR
  JPY
}

enum PaymentStatus {
  APPROVED
  PENDING
  COMPLETED
  CANCELED
  FAILED
}

enum CardBrand {
  VISA
  MASTERCARD
  AMERICAN_EXPRESS
  DISCOVER
  DISCOVER_DINERS
  JCB
  CHINA_UNIONPAY
  SQUARE_GIFT_CARD
  SQUARE_CAPITAL_CARD
  INTERAC
  FELICA
  ELO
  OTHER_BRAND
}

enum CardType {
  DEBIT
  CREDIT
  PREPAID
  UNKNOWN
}

enum RefundStatus {
  PENDING
  APPROVED
  REJECTED
  FAILED
}

enum DisputeStatus {
  INQUIRY_EVIDENCE_REQUIRED
  INQUIRY_PROCESSING
  INQUIRY_CLOSED
  EVIDENCE_REQUIRED
  PROCESSING
  WON
  LOST
  ACCEPTED
}

enum OrderState {
  OPEN
  COMPLETED
  CANCELED
  DRAFT
}

enum FulfillmentType {
  PICKUP
  SHIPMENT
  DELIVERY
  DIGITAL
}

enum FulfillmentState {
  PROPOSED
  RESERVED
  PREPARED
  COMPLETED
  CANCELED
  FAILED
}

enum InvoiceStatus {
  DRAFT
  UNPAID
  SCHEDULED
  PARTIALLY_PAID
  PAID
  PARTIALLY_REFUNDED
  REFUNDED
  CANCELED
  FAILED
  PAYMENT_PENDING
}

enum SubscriptionStatus {
  PENDING
  ACTIVE
  CANCELED
  DEACTIVATED
  PAUSED
}

enum LoyaltyEventType {
  ACCUMULATE_POINTS
  CREATE_REWARD
  REDEEM_REWARD
  DELETE_REWARD
  ADJUST_POINTS
  EXPIRE_POINTS
  OTHER
}

enum BookingStatus {
  PENDING
  CANCELLED_BY_CUSTOMER
  CANCELLED_BY_SELLER
  DECLINED
  ACCEPTED
  NO_SHOW
}

enum ShiftStatus {
  OPEN
  CLOSED
}

enum TerminalCheckoutStatus {
  PENDING
  IN_PROGRESS
  CANCEL_REQUESTED
  CANCELED
  COMPLETED
}

enum WebhookEventType {
  PAYMENT_CREATED
  PAYMENT_UPDATED
  ORDER_CREATED
  ORDER_UPDATED
  ORDER_FULFILLED
  REFUND_CREATED
  REFUND_UPDATED
  DISPUTE_CREATED
  DISPUTE_STATE_CHANGED
  CUSTOMER_CREATED
  CUSTOMER_UPDATED
  CUSTOMER_DELETED
  INVENTORY_COUNT_UPDATED
  SUBSCRIPTION_CREATED
  SUBSCRIPTION_UPDATED
}

enum GiftCardStatus {
  ACTIVE
  DEACTIVATED
  BLOCKED
  PENDING
}

enum GiftCardActivityType {
  ACTIVATE
  LOAD
  REDEEM
  CLEAR_BALANCE
  DEACTIVATE
  ADJUST_INCREMENT
  ADJUST_DECREMENT
  REFUND
  UNLINKED_ACTIVITY_REFUND
  IMPORT
  BLOCK
  UNBLOCK
  IMPORT_REVERSAL
  TRANSFER_BALANCE_TO
  TRANSFER_BALANCE_FROM
}

# ─────────────────────────────────────────────
# Core value types
# ─────────────────────────────────────────────

type Money {
  amount: Int
  currency: Currency!
}

type Address {
  addressLine1: String
  addressLine2: String
  addressLine3: String
  locality: String
  sublocality: String
  administrativeDistrictLevel1: String
  postalCode: String
  country: String
}

type Coordinates {
  latitude: Float
  longitude: Float
}

type TimeRange {
  startAt: DateTime
  endAt: DateTime
}

# ─────────────────────────────────────────────
# Payment domain
# ─────────────────────────────────────────────

type Payment {
  id: ID!
  createdAt: DateTime!
  updatedAt: DateTime
  amountMoney: Money!
  tipMoney: Money
  totalMoney: Money
  appFeeMoney: Money
  processingFee: [ProcessingFee]
  refundedMoney: Money
  status: PaymentStatus!
  delayDuration: String
  delayAction: String
  delayedUntil: DateTime
  sourceType: String
  cardDetails: CardDetails
  walletDetails: WalletDetails
  bankAccountDetails: BankAccountDetails
  externalDetails: ExternalDetails
  cashDetails: CashDetails
  buyNowPayLaterDetails: BuyNowPayLater
  locationId: ID
  orderId: ID
  referenceId: String
  customerId: ID
  employeeId: ID
  teamMemberId: ID
  refundIds: [ID]
  riskEvaluation: RiskEvaluation
  buyerEmailAddress: String
  billingAddress: Address
  shippingAddress: Address
  note: String
  statementDescriptionIdentifier: String
  receiptNumber: String
  receiptUrl: String
  deviceDetails: DeviceSummary
  applicationDetails: ApplicationDetails
  versionToken: String
  order: Order
  customer: Customer
  refunds: [Refund]
}

type ProcessingFee {
  effectiveAt: DateTime
  type: String
  amountMoney: Money
}

type RiskEvaluation {
  createdAt: DateTime
  riskLevel: String
}

type ApplicationDetails {
  squareProduct: String
  applicationId: String
}

type DeviceSummary {
  deviceId: String
  deviceName: String
  deviceInstallationId: String
}

type CardDetails {
  status: String
  card: Card
  entryMethod: String
  cvvStatus: String
  avsStatus: String
  authResultCode: String
  applicationIdentifier: String
  applicationName: String
  applicationCryptogram: String
  verificationMethod: String
  verificationResults: String
  statementDescription: String
  deviceDetails: DeviceSummary
  cardPaymentTimeline: CardPaymentTimeline
  refundRequiresCardPresence: Boolean
  errors: [PaymentError]
}

type CardPaymentTimeline {
  authorizedAt: DateTime
  capturedAt: DateTime
  voidedAt: DateTime
}

type PaymentError {
  category: String
  code: String
  detail: String
  field: String
}

type Card {
  id: ID!
  cardBrand: CardBrand
  last4: String
  expMonth: Int
  expYear: Int
  cardholderName: String
  billingAddress: Address
  fingerprint: String
  customerId: ID
  merchantId: ID
  referenceId: String
  enabled: Boolean
  cardType: CardType
  prepaidType: String
  bin: String
  version: Int
  cardCoBrand: String
  customer: Customer
}

type WalletDetails {
  status: String
  brand: String
  cashAppDetails: CashAppDetails
}

type CashAppDetails {
  buyerFullName: String
  buyerCountryCode: String
  buyerCashtag: String
}

type BankAccountDetails {
  bankName: String
  transferType: String
  accountOwnershipType: String
  fingerprint: String
  country: String
  statementDescription: String
  achDetails: AchDetails
  errors: [PaymentError]
}

type AchDetails {
  routingNumber: String
  accountNumberSuffix: String
  accountType: String
}

type CashDetails {
  buyerSuppliedMoney: Money!
  changeBackMoney: Money
}

type ExternalDetails {
  type: String!
  source: String!
  sourceId: String
  sourceFeeMoney: Money
}

type BuyNowPayLater {
  brand: String
  afterpayDetails: AfterpayDetails
  clearpayDetails: ClearpayDetails
}

type AfterpayDetails {
  emailAddress: String
  checkoutId: String
  internalId: String
}

type ClearpayDetails {
  emailAddress: String
  checkoutId: String
  internalId: String
}

type PaymentMethod {
  id: ID!
  type: String!
  card: Card
  bankAccount: BankAccount
  walletDetails: WalletDetails
  customerId: ID
  customer: Customer
}

# ─────────────────────────────────────────────
# Bank Accounts
# ─────────────────────────────────────────────

type BankAccount {
  id: ID!
  accountNumberSuffix: String!
  country: String!
  currency: Currency!
  accountType: String!
  holderName: String!
  primaryBankIdentificationNumber: String
  secondaryBankIdentificationNumber: String
  debitMandateReferenceId: String
  referenceId: String
  locationId: ID
  status: String!
  creditable: Boolean!
  debitable: Boolean!
  fingerprint: String
  version: Int
  bankName: String
}

# ─────────────────────────────────────────────
# Refunds
# ─────────────────────────────────────────────

type Refund {
  id: ID!
  status: RefundStatus!
  locationId: ID
  unlinked: Boolean
  destinationType: String
  destinationDetails: DestinationDetails
  amountMoney: Money!
  appFeeMoney: Money
  processingFee: [ProcessingFee]
  paymentId: ID
  orderId: ID
  reason: String
  createdAt: DateTime!
  updatedAt: DateTime
  teamMemberId: ID
  terminalRefundDetails: TerminalRefundDetails
  payment: Payment
}

type DestinationDetails {
  cardDetails: RefundCardDetails
  cashDetails: CashRefundDetails
  externalDetails: ExternalRefundDetails
}

type RefundCardDetails {
  card: Card
  entryMethod: String
}

type CashRefundDetails {
  sellerSuppliedMoney: Money!
  changeBackMoney: Money
}

type ExternalRefundDetails {
  type: String!
  source: String!
  sourceId: String
}

type TerminalRefundDetails {
  deviceId: String
  deadlineAt: DateTime
  status: String
}

# ─────────────────────────────────────────────
# Disputes
# ─────────────────────────────────────────────

type Dispute {
  id: ID!
  amountMoney: Money
  reason: String
  status: DisputeStatus!
  dueAt: DateTime
  disputedPayment: DisputedPayment
  evidenceIds: [ID]
  cardBrand: CardBrand
  createdAt: DateTime!
  updatedAt: DateTime
  brandDisputeId: String
  reportedDate: String
  version: Int
  locationId: ID
  evidence: [DisputeEvidence]
}

type DisputedPayment {
  paymentId: ID
}

type DisputeEvidence {
  id: ID!
  disputeId: ID!
  evidenceFile: EvidenceFile
  evidenceText: String
  createdAt: DateTime
  evidenceType: String
  uploadedAt: DateTime
}

type EvidenceFile {
  filename: String
  filetype: String
}

# ─────────────────────────────────────────────
# Orders
# ─────────────────────────────────────────────

type Order {
  id: ID!
  locationId: ID!
  referenceId: String
  source: OrderSource
  customerId: ID
  lineItems: [OrderLineItem]
  taxes: [OrderTax]
  discounts: [OrderDiscount]
  serviceCharges: [OrderServiceCharge]
