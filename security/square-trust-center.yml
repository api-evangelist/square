security_features:
  - End-to-end encryption of card data from capture through processing.
  - Tokenization — card details are replaced with single-use / stored tokens; raw PANs never touch the seller server when using Square SDKs.
  - Built-in fraud detection and risk evaluation on payments (see risk_evaluation in sandbox).
  - Dispute / chargeback handling via the Disputes API.
